<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gallery Viewer | Chenglin Pua</title>
    <meta name="description" content="Full-size image viewer and download page for Chenglin Pua gallery images.">
    <meta name="robots" content="index, follow, max-image-preview:large">
    <link rel="icon" href="https://placehold.co/32x32/1D4ED8/FFFFFF?text=P">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');

        :root {
            --viewer-ink: #0f172a;
            --viewer-muted: #64748b;
            --viewer-line: rgba(15, 23, 42, 0.1);
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: 'Inter', system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            color: var(--viewer-ink);
            background:
                radial-gradient(circle at top left, rgba(59, 130, 246, 0.12), transparent 26rem),
                radial-gradient(circle at top right, rgba(20, 184, 166, 0.12), transparent 26rem),
                linear-gradient(180deg, #f8fbff 0%, #eef4fb 55%, #f8fbff 100%);
        }

        .shell {
            max-width: 1200px;
            margin: 0 auto;
            padding: 2rem 1.25rem 3rem;
        }

        .topbar {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: space-between;
            gap: 1rem;
            margin-bottom: 1.5rem;
        }

        .eyebrow {
            color: #1d4ed8;
            font-size: 0.8rem;
            font-weight: 800;
            letter-spacing: 0.18em;
            text-transform: uppercase;
        }

        h1 {
            margin: 0.3rem 0 0;
            font-size: clamp(2rem, 4vw, 3.5rem);
            line-height: 1.05;
        }

        .actions {
            display: flex;
            flex-wrap: wrap;
            gap: 0.75rem;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-height: 46px;
            padding: 0.8rem 1.2rem;
            border-radius: 999px;
            text-decoration: none;
            font-weight: 700;
            transition: transform 0.2s ease, box-shadow 0.2s ease, border-color 0.2s ease;
        }

        .btn:hover {
            transform: translateY(-2px);
        }

        .btn-primary {
            background: #12395b;
            color: white;
            box-shadow: 0 12px 22px rgba(18, 57, 91, 0.24);
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.86);
            color: var(--viewer-ink);
            border: 1px solid var(--viewer-line);
            box-shadow: 0 10px 20px rgba(15, 23, 42, 0.08);
        }

        .viewer-card {
            border: 1px solid var(--viewer-line);
            border-radius: 24px;
            background: rgba(255, 255, 255, 0.86);
            box-shadow: 0 24px 60px rgba(15, 23, 42, 0.08);
            padding: 1.2rem;
            backdrop-filter: blur(12px);
        }

        .viewer-stage {
            display: grid;
            place-items: center;
            min-height: 68vh;
            border-radius: 18px;
            overflow: hidden;
            background:
                linear-gradient(135deg, rgba(255, 255, 255, 0.72), rgba(238, 244, 251, 0.92));
        }

        .viewer-stage img {
            display: block;
            width: 100%;
            height: auto;
            max-height: 80vh;
            object-fit: contain;
        }

        .meta {
            margin-top: 1rem;
            color: var(--viewer-muted);
            font-size: 0.96rem;
        }

        .empty-state {
            display: grid;
            place-items: center;
            min-height: 48vh;
            text-align: center;
        }

        @media (max-width: 768px) {
            .shell {
                padding-top: 1.2rem;
            }

            .viewer-card {
                padding: 0.9rem;
            }
        }
    </style>
</head>
<body>
    <main class="shell">
        <div class="topbar">
            <div>
                <p class="eyebrow">Gallery Viewer</p>
                <h1 id="viewer-title">Image</h1>
            </div>
            <div class="actions">
                <a class="btn btn-secondary" href="./">Back to gallery</a>
                <a class="btn btn-secondary" id="open-original" href="#" target="_blank" rel="noopener noreferrer">Open original</a>
                <a class="btn btn-primary" id="download-link" href="#" download>Download image</a>
            </div>
        </div>

        <section class="viewer-card" id="viewer-shell">
            <div class="viewer-stage" id="viewer-stage">
                <img id="viewer-image" alt="">
            </div>
            <p class="meta" id="viewer-meta" hidden></p>
        </section>
    </main>

    <script>
        function deriveTitleFromSrc(src) {
            if (!src) return 'Image';
            const cleanSrc = src.split('?')[0].split('#')[0];
            const parts = cleanSrc.split('/');
            const fileName = parts[parts.length - 1] || 'image';
            const noExt = fileName.replace(/\.[^.]+$/, '');
            return noExt.replace(/[_-]+/g, ' ').replace(/\s+/g, ' ').trim();
        }

        const params = new URLSearchParams(window.location.search);
        const src = params.get('src');
        const title = params.get('title') || deriveTitleFromSrc(src);

        const titleEl = document.getElementById('viewer-title');
        const imageEl = document.getElementById('viewer-image');
        const openOriginalEl = document.getElementById('open-original');
        const downloadEl = document.getElementById('download-link');
        const metaEl = document.getElementById('viewer-meta');
        const stageEl = document.getElementById('viewer-stage');

        if (!src) {
            titleEl.textContent = 'Image not found';
            stageEl.innerHTML = '<div class="empty-state"><div><h2>No image source was provided.</h2><p>Return to the gallery and open an image again.</p></div></div>';
            openOriginalEl.removeAttribute('href');
            downloadEl.removeAttribute('href');
            downloadEl.removeAttribute('download');
            metaEl.hidden = false;
            metaEl.textContent = 'The viewer needs a valid image source in the URL.';
        } else {
            document.title = `${title} | Chenglin Pua Gallery`;
            titleEl.textContent = title;
            imageEl.src = src;
            imageEl.alt = title;
            openOriginalEl.href = src;
            downloadEl.href = src;
            downloadEl.setAttribute('download', title.replace(/\s+/g, '_'));
            metaEl.hidden = true;
            metaEl.textContent = '';
        }
    </script>
</body>
</html>
