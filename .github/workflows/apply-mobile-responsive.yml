name: Apply mobile responsive layout

on:
  push:
    branches:
      - codex/mobile-responsive

permissions:
  contents: write

jobs:
  apply-responsive-layout:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: codex/mobile-responsive
          fetch-depth: 0

      - name: Patch responsive navigation and mobile layout
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path
          import html
          import re

          files = [
              Path('index.html'),
              Path('research/index.html'),
              Path('personal/index.html'),
              Path('gallery/index.html'),
              Path('articles/index.html'),
          ]

          css = r'''

          /* Shared responsive behavior for phones and tablets */
          html { scroll-behavior: smooth; }
          body { overflow-x: hidden; }

          @media (max-width: 767px) {
              header h1,
              header > div > a {
                  max-width: calc(100vw - 5rem);
                  overflow: hidden;
                  text-overflow: ellipsis;
                  white-space: nowrap;
              }

              .magnify-on-hover:hover,
              .photo-tile:hover,
              .gallery-tile:hover,
              .video-tile:hover,
              .research-image-link:hover {
                  transform: none !important;
              }
          }

          @media (max-width: 420px) {
              .album-grid,
              .gallery-grid {
                  grid-template-columns: 1fr !important;
              }
          }
          '''

          js = r'''

          <script>
          (() => {
              const button = document.getElementById('mobile-menu-button');
              const menu = document.getElementById('mobile-menu');
              const openIcon = document.getElementById('mobile-menu-open-icon');
              const closeIcon = document.getElementById('mobile-menu-close-icon');

              if (!button || !menu) return;

              const closeMenu = () => {
                  menu.classList.add('hidden');
                  button.setAttribute('aria-expanded', 'false');
                  if (openIcon) openIcon.classList.remove('hidden');
                  if (closeIcon) closeIcon.classList.add('hidden');
              };

              button.addEventListener('click', () => {
                  const willOpen = menu.classList.contains('hidden');
                  menu.classList.toggle('hidden');
                  button.setAttribute('aria-expanded', String(willOpen));
                  if (openIcon) openIcon.classList.toggle('hidden', willOpen);
                  if (closeIcon) closeIcon.classList.toggle('hidden', !willOpen);
              });

              menu.querySelectorAll('a').forEach(link => link.addEventListener('click', closeMenu));
              window.addEventListener('resize', () => {
                  if (window.innerWidth >= 768) closeMenu();
              });
              document.addEventListener('keydown', event => {
                  if (event.key === 'Escape') closeMenu();
              });
          })();
          </script>
          '''

          nav_pattern = re.compile(
              r'(<nav\b[^>]*class="[^"]*hidden[^"]*md:flex[^"]*"[^>]*>)(.*?)(</nav>)',
              re.IGNORECASE | re.DOTALL,
          )
          link_pattern = re.compile(r'<a\b[^>]*href="([^"]+)"[^>]*>(.*?)</a>', re.IGNORECASE | re.DOTALL)

          for path in files:
              if not path.exists():
                  print(f'Skipping missing file: {path}')
                  continue

              text = path.read_text(encoding='utf-8')
              if 'id="mobile-menu-button"' in text:
                  print(f'Already patched: {path}')
                  continue

              match = nav_pattern.search(text)
              if not match:
                  raise RuntimeError(f'Could not find desktop navigation in {path}')

              links = []
              for href, label_html in link_pattern.findall(match.group(2)):
                  label = re.sub(r'<[^>]+>', '', label_html)
                  label = html.unescape(re.sub(r'\s+', ' ', label)).strip()
                  links.append((href, label))

              mobile_links = '\n'.join(
                  f'                    <a href="{href}" class="block rounded-lg px-4 py-3 text-base font-semibold text-white/90 hover:bg-white/10 hover:text-white">{label}</a>'
                  for href, label in links
              )

              mobile_markup = f'''
                <button id="mobile-menu-button" type="button"
                    class="inline-flex items-center justify-center rounded-lg border border-white/30 p-2 text-white hover:bg-white/10 focus:outline-none focus:ring-2 focus:ring-white/70 md:hidden"
                    aria-controls="mobile-menu" aria-expanded="false" aria-label="Open navigation menu">
                    <svg id="mobile-menu-open-icon" class="h-6 w-6" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
                        <path stroke-linecap="round" d="M4 6h16M4 12h16M4 18h16"></path>
                    </svg>
                    <svg id="mobile-menu-close-icon" class="hidden h-6 w-6" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
                        <path stroke-linecap="round" d="M6 6l12 12M18 6L6 18"></path>
                    </svg>
                </button>
                <div id="mobile-menu" class="fixed left-0 right-0 top-16 z-50 hidden border-t border-white/20 bg-[#12395b]/[0.98] px-4 py-3 shadow-2xl backdrop-blur md:hidden">
{mobile_links}
                </div>'''

              text = text[:match.end()] + mobile_markup + text[match.end():]

              # Scale the brand and major headings more smoothly on small screens.
              text = text.replace(
                  'class="text-3xl font-extrabold tracking-tight text-white"',
                  'class="text-xl sm:text-3xl font-extrabold tracking-tight text-white"',
              )
              text = text.replace(
                  'class="text-2xl font-extrabold tracking-tight text-white"',
                  'class="text-xl sm:text-2xl font-extrabold tracking-tight text-white"',
              )
              text = text.replace(
                  'class="text-4xl font-bold mb-8 text-center"',
                  'class="text-3xl sm:text-4xl font-bold mb-8 text-center"',
              )

              # Reduce card padding on narrow phones while retaining desktop spacing.
              text = text.replace('class="bg-white p-8 rounded-xl', 'class="bg-white p-5 sm:p-8 rounded-xl')
              text = text.replace('class="bg-white p-6 rounded-xl', 'class="bg-white p-5 sm:p-6 rounded-xl')

              # Stack date/value rows vertically on phones rather than compressing text.
              text = text.replace(
                  'class="bg-white p-5 rounded-xl shadow-sm hover:shadow-md transition duration-150 flex justify-between items-center"',
                  'class="bg-white p-5 rounded-xl shadow-sm hover:shadow-md transition duration-150 flex flex-col gap-3 sm:flex-row sm:justify-between sm:items-center"',
              )
              text = text.replace(
                  'class="bg-white p-5 rounded-xl shadow-sm hover:shadow-md transition duration-150 flex justify-between items-start"',
                  'class="bg-white p-5 rounded-xl shadow-sm hover:shadow-md transition duration-150 flex flex-col gap-3 sm:flex-row sm:justify-between sm:items-start"',
              )
              text = text.replace('class="flex-grow md:w-3/4 pr-4"', 'class="w-full flex-grow sm:w-3/4 sm:pr-4"')
              text = text.replace('class="text-gray-500 text-base md:w-1/4 text-right', 'class="w-full text-left text-gray-500 text-base sm:w-1/4 sm:text-right')

              # Let footer links wrap instead of overflowing on small screens.
              text = text.replace(
                  'class="flex justify-center space-x-6 mb-4"',
                  'class="flex flex-wrap justify-center gap-x-4 gap-y-2 mb-4"',
              )

              if css.strip() not in text:
                  text = text.replace('</style>', css + '\n    </style>', 1)
              text = text.replace('</body>', js + '\n</body>', 1)

              path.write_text(text, encoding='utf-8')
              print(f'Patched {path}')
          PY

      - name: Commit responsive changes
        shell: bash
        run: |
          if git diff --quiet; then
            echo "No responsive changes were required."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html research/index.html personal/index.html gallery/index.html articles/index.html
          git commit -m "Add responsive mobile navigation and layouts [skip ci]"
          git push origin HEAD:codex/mobile-responsive
